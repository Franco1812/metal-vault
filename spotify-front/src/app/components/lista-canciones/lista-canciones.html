<section class="card bg-dark border-0 shadow-lg song-card">
  <div class="card-header bg-black text-light">
    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div>
        <h2 class="h4 mb-1 font-display">{{ artistaActual }}</h2>
        <p class="text-secondary mb-0 small">
          Resultados de la búsqueda
        </p>
      </div>
      <span class="badge pill-stat">{{ canciones.length }} tracks</span>
    </div>

    <form class="search-bar mt-3" (ngSubmit)="buscar()">
      <div class="input-group">
        <span class="input-group-text">Buscar</span>
        <input
          class="form-control"
          type="text"
          name="busqueda"
          [(ngModel)]="terminoBusqueda"
          placeholder="Metallica, Slipknot, Rammstein..."
          aria-label="Buscar banda o artista"
        >
        <button class="btn btn-accent" type="submit">Explorar</button>
      </div>
    </form>

    <div class="quick-picks mt-3">
      <button type="button" class="btn btn-chip" (click)="buscarCon('Megadeth')">Megadeth</button>
      <button type="button" class="btn btn-chip" (click)="buscarCon('Metallica')">Metallica</button>
      <button type="button" class="btn btn-chip" (click)="buscarCon('Slayer')">Slayer</button>
      <button type="button" class="btn btn-chip" (click)="buscarCon('Nightwish')">Nightwish</button>
    </div>
  </div>

  <div class="card-body p-0">
    <div *ngIf="cargando" class="p-4 text-secondary">Cargando canciones...</div>
    <div *ngIf="error" class="p-4 text-danger">{{ error }}</div>

    <div *ngIf="!cargando && !error" class="table-responsive">
      <table class="table table-dark table-striped align-middle mb-0">
        <thead>
          <tr>
            <th scope="col">#</th>
            <th scope="col">Portada</th>
            <th scope="col">Tema</th>
            <th scope="col">Álbum</th>
            <th scope="col">Duración</th>
            <th scope="col" class="text-end">Acción</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let cancion of canciones; index as i">
            <td class="text-secondary">{{ i + 1 }}</td>
            <td>
              <img
                class="rounded-2 object-fit-cover"
                style="width: 48px; height: 48px;"
                [src]="cancion.urlPortada"
                [alt]="cancion.titulo"
                loading="lazy"
                (error)="onImgErrorForCancion($event, cancion)"
              >
            </td>
            <td class="fw-semibold">{{ cancion.titulo }}</td>
            <td class="text-secondary">{{ cancion.album || '—' }}</td>
            <td class="text-secondary">{{ cancion.duracion || '—' }}</td>
            <td class="text-end">
              <button class="btn btn-outline-light btn-sm" (click)="play(cancion)">
                Play
              </button>
            </td>
          </tr>
          <tr *ngIf="canciones.length === 0">
            <td colspan="5" class="text-center text-secondary py-4">
              No hay temas de {{ artistaActual }} en el JSON.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>
